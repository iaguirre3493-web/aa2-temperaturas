apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temperaturas-frontend
  template:
    metadata:
      labels:
        app: temperaturas-frontend
    spec:
      containers:
        - name: temperaturas-frontend
          image: ibone93/temperaturas-frontend:v2
          ports:
            - containerPort: 3001
          env:
            - name: TEMP_SERVER
              value: temperaturas-backend:5000
---
apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend
spec:
  type: LoadBalancer
  selector:
    app: temperaturas-frontend
  ports:
    - port: 80
      targetPort: 3001
